<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Empresa - WydoraçoBot</title>
  <link rel="stylesheet" href="css/cadastro.css">

</head>
<body>


<div id="mother">    

<h1 class="animated-title">Bem vindo(a) à plataforma da Wydoraço </h1>


  <div class="container">
    <h2>Cadastro de Empresa</h2>
    <form id="formCadastro">
      <label for="nome">Nome da Empresa</label>
      <input type="text" id="nome" placeholder="Digite o nome da empresa" required>

      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Digite o email da empresa" required>

      <label for="senha">Senha</label>
      <input type="password" id="senha" placeholder="Digite uma senha" required>

      <button type="submit">Cadastrar</button>
    </form>

    <div id="mensagem"></div>
  </div>

  </div>


<script src="js/cadastro.js"></script>
</body>
</html>
