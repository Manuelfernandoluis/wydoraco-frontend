    <title>WydoraçoBot</title>
    <link rel="stylesheet" href="css/index.css">


</head>
<body>
     <!-- Cabeçalho é caixa principal do chat -->
      <div class="chat-container">

         <!-- chat-header onde vai ficar o nome do chat-->
          <header class="chat-header">
                🤖 WydoraçoBot
          </header>

           <!-- Área das mensagens onde vão aparecer elas -->
            <div class="chat-messages" id="chat"></div>

                 <!-- Botões rápidos -->
                  <div class="quick-actions">
                    <button onclick="acaoRapida('O que e a Wydoraco')" id="firstButton"> O que é a Wydoraço

                    </button>

                    <button onclick="acaoRapida('servicos')" id="firstButton">serviços</button>

                    <button onclick="acaoRapida('produtos')" id="firstButton">produtos</button>
                  </div>

                  <!-- Campo de texto onde serão digitado as informações -->
                   <div class="chat-input">
                     <input type="text" id="inputMensagem" placeholder="Digite a sua mensagem...">
                     <button onclick="enviarMensagem()">Enviar</button>

                   </div> 
            </div>

            <script src="js/index.js"></script>
