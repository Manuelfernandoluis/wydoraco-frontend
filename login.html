<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Wydoraço</title>
  <link rel="stylesheet" href="css/login.css">
</head>
<body>

  <div class="container">
    <h1 class="animated-title">Bem-vindo(a) de volta!</h1>

    <form id="formLogin">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Digite seu email" required>

      <label for="senha">Senha</label>
      <input type="password" id="senha" placeholder="Digite sua senha" required>

      <button type="submit">Entrar</button>
    </form>

    <p style="margin-top:15px;">
      <a href="cadastro.html" style="color:#1E90FF; text-decoration:none;">Criar conta</a> | 
      <a href="recuperar.html" style="color:#1E90FF; text-decoration:none;">Esqueceu a senha?</a>
    </p>

    <div id="mensagem"></div>
  </div>


  <script src="js/login.js"></script>

</body>
</html>
